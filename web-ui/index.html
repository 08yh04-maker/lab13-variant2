<!DOCTYPE html>
<html>
<head>
    <title>Tech Support MAS Monitor</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        .status { padding: 10px; margin: 5px; border-radius: 5px; }
        .ok { background: #90EE90; }
        .busy { background: #FFD700; }
        .error { background: #FF6B6B; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #4CAF50; color: white; }
    </style>
</head>
<body>
    <h1>Multi-Agent System Monitor</h1>
    
    <h2>System Status</h2>
    <div id="status"></div>
    
    <h2>Agents</h2>
    <table id="agents-table">
        <tr><th>Agent</th><th>Status</th><th>Processed</th><th>Last Active</th></tr>
    </table>
    
    <h2>Create Ticket</h2>
    <input type="text" id="title" placeholder="Title" size="50">
    <textarea id="description" placeholder="Description" rows="3" cols="50"></textarea>
    <button onclick="createTicket()">Submit Ticket</button>
    <div id="result"></div>

    <script>
        async function loadStatus() {
            try {
                const response = await fetch('http://localhost:8000/stats');
                const stats = await response.json();
                document.getElementById('status').innerHTML = `
                    <div class="status ok">Total Processed: ${stats.total_processed}</div>
                    <div class="status ok">Pending Tasks: ${stats.pending_tasks}</div>
                    <div class="status ok">Total Tickets: ${stats.total_tickets}</div>
                `;
            } catch(e) {
                document.getElementById('status').innerHTML = '<div class="status error">Orchestrator not reachable</div>';
            }
        }
        
        async function createTicket() {
            const title = document.getElementById('title').value;
            const description = document.getElementById('description').value;
            
            if (!title) {
                alert('Please enter a title');
                return;
            }
            
            try {
                const response = await fetch('http://localhost:8000/ticket', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, description })
                });
                const result = await response.json();
                document.getElementById('result').innerHTML = `
                    <div class="status ok">Ticket created! ID: ${result.id}<br>Status: ${result.status}<br>Response: ${result.response || 'Processing...'}</div>
                `;
                document.getElementById('title').value = '';
                document.getElementById('description').value = '';
                loadStatus();
            } catch(e) {
                document.getElementById('result').innerHTML = '<div class="status error">Error creating ticket</div>';
            }
        }
        
        setInterval(loadStatus, 5000);
        loadStatus();
    </script>
</body>
</html>
